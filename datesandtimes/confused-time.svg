<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
  <title id="title">Clock, calendar, confused face, and Java date code</title>
  <desc id="desc">An illustration with a clock on the left, a calendar on the right, a confused human face in the center, and Java code that mentions java.util.Date.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fcff"/>
      <stop offset="100%" stop-color="#e9f2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#52657d" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1000" height="520" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <circle cx="190" cy="210" r="120" fill="#ffffff" stroke="#2f517d" stroke-width="10"/>
    <circle cx="190" cy="210" r="9" fill="#2f517d"/>
    <line x1="190" y1="210" x2="190" y2="145" stroke="#2f517d" stroke-width="8" stroke-linecap="round"/>
    <line x1="190" y1="210" x2="245" y2="240" stroke="#2f517d" stroke-width="8" stroke-linecap="round"/>
    <g stroke="#2f517d" stroke-width="5" stroke-linecap="round">
      <line x1="190" y1="101" x2="190" y2="117"/>
      <line x1="267" y1="133" x2="256" y2="145"/>
      <line x1="299" y1="210" x2="283" y2="210"/>
      <line x1="267" y1="287" x2="256" y2="275"/>
      <line x1="190" y1="319" x2="190" y2="303"/>
      <line x1="113" y1="287" x2="124" y2="275"/>
      <line x1="81" y1="210" x2="97" y2="210"/>
      <line x1="113" y1="133" x2="124" y2="145"/>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="700" y="90" width="220" height="250" rx="20" fill="#ffffff" stroke="#2f6f65" stroke-width="9"/>
    <rect x="700" y="90" width="220" height="56" rx="20" fill="#2f6f65"/>
    <circle cx="748" cy="90" r="10" fill="#ffffff"/>
    <circle cx="872" cy="90" r="10" fill="#ffffff"/>
    <g fill="#b9dcd6">
      <rect x="728" y="170" width="38" height="32" rx="5"/>
      <rect x="780" y="170" width="38" height="32" rx="5"/>
      <rect x="832" y="170" width="38" height="32" rx="5"/>
      <rect x="728" y="214" width="38" height="32" rx="5"/>
      <rect x="780" y="214" width="38" height="32" rx="5"/>
      <rect x="832" y="214" width="38" height="32" rx="5"/>
      <rect x="728" y="258" width="38" height="32" rx="5"/>
      <rect x="780" y="258" width="38" height="32" rx="5"/>
      <rect x="832" y="258" width="38" height="32" rx="5"/>
    </g>
    <rect x="780" y="214" width="38" height="32" rx="5" fill="#ff9d66"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="500" cy="220" r="72" fill="#ffd8bd" stroke="#8e5c46" stroke-width="6"/>
    <circle cx="472" cy="208" r="6" fill="#2f2521"/>
    <circle cx="528" cy="208" r="6" fill="#2f2521"/>
    <path d="M456 186 q16 -16 32 0" fill="none" stroke="#8e5c46" stroke-width="5" stroke-linecap="round"/>
    <path d="M512 186 q16 -16 32 0" fill="none" stroke="#8e5c46" stroke-width="5" stroke-linecap="round"/>
    <path d="M474 244 q26 -22 52 0" fill="none" stroke="#8e5c46" stroke-width="6" stroke-linecap="round"/>
    <text x="430" y="170" font-family="Arial, sans-serif" font-size="54" fill="#e98b2a">?</text>
    <text x="560" y="182" font-family="Arial, sans-serif" font-size="58" fill="#e98b2a">?</text>
    <text x="512" y="130" font-family="Arial, sans-serif" font-size="44" fill="#e98b2a">?</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="260" y="360" width="500" height="118" rx="14" fill="#0f1720"/>
    <text x="286" y="396" font-family="Menlo, Consolas, monospace" font-size="24" fill="#a6e3ff">Date now = new java.util.Date();</text>
    <text x="286" y="432" font-family="Menlo, Consolas, monospace" font-size="22" fill="#7fd3a6">System.out.println(now);</text>
